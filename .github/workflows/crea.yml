name: Validar Proyecto Flask

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar entorno de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 3. Instalar dependencias en la Action
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Validar que el Dockerfile compile bien
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
