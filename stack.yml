version: "3.8"

services:
  alex:
    image: ghcr.io/arszaruma-gif/holaflask:latests
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - traefik-public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.alex.entrypoints=http"
        - "traefik.http.routers.alex.rule=Host(`alex.byronrm.com`)"
        - "traefik.http.middlewares.alex-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.alex.middlewares=alex-https-redirect"
        - "traefik.http.routers.alex-secure.entrypoints=https"
        - "traefik.http.routers.alex-secure.rule=Host(`alex.byronrm.com`)"
        - "traefik.http.routers.alex-secure.tls=true"
        - "traefik.http.routers.alex-secure.tls.certresolver=http"
        - "traefik.http.routers.alex-secure.service=alex"
        - "traefik.http.services.alex.loadbalancer.server.port=5000"
        - "traefik.docker.network=traefik-public"

networks:
  traefik-public:
    external: true
